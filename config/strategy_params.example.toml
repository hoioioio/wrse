[data]
backtest_cache_dir = "c:/backtest_cache"
regime_cache_dir = "c:/alpha_cache"
timeframe = "15m"
symbols = ["BTC_USDT", "ETH_USDT", "BNB_USDT", "SOL_USDT", "DOGE_USDT"]

[execution]
slippage_bps = 2.0
taker_fee_rate = 0.0004
maker_fee_rate = 0.0002
exec_mode = "maker_then_taker"

[walk_forward]
years = [2020, 2021, 2022, 2023, 2024]
weights_grid = [0.3, 0.5, 0.7]
v2_param_samples = 20

[shock_model]
horizon_bars = 6
label_threshold = 0.08
neg_ratio = 2.0
ridge_l2 = 5.0

[risk]
portfolio_slots = 5
risk_per_trade = 0.0125
stop_loss_pct_trend = 0.02
stop_loss_pct_shock = 0.03
